<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workers AI</title>
    <script src="daythree.js" defer></script>

</head>
<body class="min-h-screen bg-red-300">
    <header>
        <h1>Day 3</h1>
    </header>

     <main>
        <div id="chatWindow" class="fixed bottom-5 right-5 w-70 max-h-[425px] overflow-hidden transition-all duration-300 ease-in-out bg-white">
        <header id="chatHeader" class=" flex items-center justify-between border-b border-blue-300 px-4">
            <h2>Friendly Assistant</h2>
            <span id="time">2m ago</span>
        </header>
        <output>
            <div class="h-[300px] overflow-auto space-y-3" id="output"></div>
        </output>
        <footer>
            <form class="flex gap-2 border-t border-blue-300 justify-end" id="inputArea">
                    <input class="border-blue-500 border-1 rounded-md px-2 " type="text" name="prompt" id="prompt"></input>
                    <button class="rounded-md bg-blue-600 px-4 text-white">Send</button> 
            </form>
        </footer>
        </div>
    </main>
</body>
</html>
